<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>UB Study — 기본동사 프레임 드릴</title>
<style>
:root{
  --bg:#F5F4EF; --card:#FFFFFF; --ink:#1C1F26; --sub:#6E7380; --line:#E3E1D9;
  --acc:#147A5C; --accbg:#E7F2ED; --bad:#B8433A; --badbg:#F9ECEA; --chip:#EFEDE6;
  --mono:ui-monospace,"Cascadia Code",Consolas,"SF Mono",Menlo,monospace;
  --sans:"Pretendard Variable",Pretendard,-apple-system,"Segoe UI","Malgun Gothic",sans-serif;
}
@media (prefers-color-scheme: dark){:root{
  --bg:#17181B; --card:#212327; --ink:#E9EAEC; --sub:#9BA0AA; --line:#33363C;
  --acc:#4CC29A; --accbg:#1D2E28; --bad:#E07B6F; --badbg:#33221F; --chip:#2B2D32;
}}
:root[data-theme="dark"]{
  --bg:#17181B; --card:#212327; --ink:#E9EAEC; --sub:#9BA0AA; --line:#33363C;
  --acc:#4CC29A; --accbg:#1D2E28; --bad:#E07B6F; --badbg:#33221F; --chip:#2B2D32;
}
:root[data-theme="light"]{
  --bg:#F5F4EF; --card:#FFFFFF; --ink:#1C1F26; --sub:#6E7380; --line:#E3E1D9;
  --acc:#147A5C; --accbg:#E7F2ED; --bad:#B8433A; --badbg:#F9ECEA; --chip:#EFEDE6;
}
*{box-sizing:border-box;margin:0}
html{background:var(--bg)}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);line-height:1.5;-webkit-font-smoothing:antialiased}
.wrap{max-width:560px;margin:0 auto;padding:18px 16px 64px}
header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px}
.brand{font-family:var(--mono);font-size:15px;font-weight:600;letter-spacing:.06em}
.brand em{color:var(--acc);font-style:normal}
nav{display:flex;gap:4px}
nav button{font:inherit;font-size:13px;padding:5px 12px;border:1px solid transparent;border-radius:999px;background:none;color:var(--sub);cursor:pointer}
nav button.on{background:var(--card);border-color:var(--line);color:var(--ink);font-weight:600}
nav button:focus-visible,button:focus-visible,select:focus-visible{outline:2px solid var(--acc);outline-offset:2px}
.opts{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.opts select{font:inherit;font-size:13px;padding:5px 8px;border:1px solid var(--line);border-radius:8px;background:var(--card);color:var(--ink);max-width:100%}
.vchips{display:flex;gap:6px;flex-wrap:wrap}
.vchips button{font:inherit;font-size:12.5px;padding:5px 11px;border:1px solid var(--line);border-radius:999px;background:var(--card);color:var(--sub);cursor:pointer}
.vchips button.on{background:var(--accbg);border-color:var(--acc);color:var(--acc);font-weight:600}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden}
.navrow{display:flex;gap:10px;margin:0 0 10px;align-items:center}
.navbtn{font:inherit;font-size:13.5px;padding:9px 0;flex:1;border:1px solid var(--line);border-radius:10px;background:var(--card);color:var(--ink);cursor:pointer}
.navbtn[disabled]{opacity:.4;cursor:default}
.navpos{font-size:12px;color:var(--sub);min-width:64px;text-align:center;font-variant-numeric:tabular-nums}
.cbody{padding:22px 20px 20px;min-height:240px;display:flex;flex-direction:column;gap:16px}
.meta{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.pill{font-size:12px;padding:3px 10px;border-radius:999px;background:var(--accbg);color:var(--acc);font-weight:600}
.fmeta{font-size:12px;color:var(--sub)}
.ko{font-size:19px;font-weight:600;line-height:1.55;text-wrap:balance}
.kosub{font-size:13.5px;color:var(--sub)}
.banned{display:flex;flex-direction:column;gap:4px}
.banned span{font-size:12.5px;color:var(--bad)}
.banned span::before{content:"✕ ";font-weight:700}
.tap{font-size:12px;color:var(--sub);margin-top:auto}
.ans{font-family:var(--mono);font-size:20px;line-height:1.45;font-weight:600;overflow-wrap:break-word}
.cloze{font-family:var(--mono);font-size:18px;line-height:1.55;font-weight:600;letter-spacing:.4px;overflow-wrap:break-word}
.amt{font-size:12.5px;color:var(--sub)}
.amt b{color:var(--ink);font-weight:600}
.note{font-size:12.5px;color:var(--acc);background:var(--accbg);border-radius:8px;padding:7px 10px}
.grade{display:flex;gap:10px;margin-top:auto}
.grade button{flex:1;font:inherit;font-size:15px;font-weight:600;padding:13px 0;border-radius:10px;cursor:pointer;border:1.5px solid}
.gok{border-color:var(--acc);color:var(--acc);background:var(--accbg)}
.gng{border-color:var(--bad);color:var(--bad);background:var(--badbg)}
.stats{margin-top:12px;font-size:12.5px;color:var(--sub);display:flex;justify-content:space-between;flex-wrap:wrap;gap:4px}
.kbd{font-family:var(--mono);font-size:11px}
.mlist{display:flex;flex-direction:column;gap:8px}
.mitem{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:12px 14px}
.mitem .ans{font-size:15px}
.mitem .kosub{margin-top:2px}
.mtop{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.mtop button{font:inherit;font-size:12.5px;padding:5px 10px;border:1px solid var(--line);border-radius:8px;background:var(--card);color:var(--sub);cursor:pointer}
.empty{color:var(--sub);font-size:14px;text-align:center;padding:40px 0}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">UB<em>·</em>STUDY</div>
    <nav>
      <button id="tabmix" class="on">믹스</button>
      <button id="tabdrill">드릴</button>
      <button id="tabcloze">빈칸</button>
      <button id="tabmiss">오답</button>
    </nav>
  </header>
  <div class="opts" id="opts">
    <div class="vchips" id="selverb"></div>
    <select id="selframe" style="display:none"></select>
  </div>
  <div id="syncstatus" style="font-size:11px;text-align:center;margin:2px 0 4px;min-height:14px;color:#999;"></div>
  <div id="main"></div>
  <div class="stats" id="foot"></div>
</div>

const CLOZE_OV={
 "I could go for some Korean food.":"_ _____ __ for some Korean food.",
 "When the U.S. sneezes, the world catches a cold.":"When the U.S. sneezes, the world _______ a cold.",
 "Let's go grab a beer — first round's on me.":"_____ __ ____ a beer — first round's on me.",

const VFAM={have:["have","has","had","having"],get:["get","gets","got","getting"],make:["make","makes","made","making"],take:["take","takes","took","taking","taken"],do:["do","does","did","doing"]};
function cloze(s,fv){
  if(CLOZE_OV[s])return CLOZE_OV[s];
  const toks=s.split(" ");
  const norm=w=>w.replace(/[^A-Za-z']/g,"").toLowerCase();
  const findV=fam=>{
    const set=new Set(VFAM[fam]);
    for(let i=0;i<toks.length;i++){if(set.has(norm(toks[i])))return i;}
    return -1;
  };
  let v=fv&&VFAM[fv]?findV(fv):-1;
  if(v<0){for(const fam of["have","get","make","take"]){v=findV(fam);if(v>=0)break;}}
  if(v<0)v=findV("do");
  if(v<0)return null;
  const AUX=new Set(["do","does","did","don't","doesn't","didn't","will","would","could","couldn't","can't","cannot","won't","wouldn't","should","shouldn't","can","may","must","is","are","was","were","am","be","been","isn't","aren't","wasn't","weren't","has","have","had","not"]);
  const ADV=new Set(["always","usually","just","still","often","never","all","only","finally","barely","somehow","hardly","even","really","actually"]);
  const CONTR=new Set(["i'm","it's","he's","she's","we're","they're","you're","i'll","we'll","he'll","she'll","you'll","it'll","let's","i've","we've","i'd","he'd","she'd","we'd","they'd"]);
  const PRON=new Set(["i","we","you","he","she","it","they"]);
  const BOUND=new Set(["to","for","of","and","but","or","that","if","because","when","while","after","before","since","like","where","how","why","who","what","whose","maybe","sorry","thanks","think","feel","heard","know","guess","hope","said","say","let","hate","want","need","keep","love","spends","going"]);
  let s0=v,subj=false;
  while(s0>0){
    const p=norm(toks[s0-1]);
    if(!p)break;
    if(!subj&&(AUX.has(p)||ADV.has(p))){s0--;continue;}
    if(!subj&&(PRON.has(p)||CONTR.has(p))){s0--;subj=true;continue;}
    if(subj){if(AUX.has(p)){s0--;continue;}break;}
    if(BOUND.has(p)||/[.!?,]$/.test(toks[s0-1]))break;
    s0--;
  }
  return toks.map((t,i)=>i>=s0&&i<=v?t.replace(/[^.,!?;:—…()]/g,"_"):t).join(" ");
}

/* ---------- 클라우드 동기화 — 05 플래시카드와 같은 /api/sync 블롭의 bv 필드 사용 ----------
   오답은 영어 문장 문자열만 올리고, 받을 땐 LOOKUP으로 카드 정보 복원. 실패해도 localStorage로 정상 동작. */
const SYNC_URL="/api/sync";
const SYNCED_KEY="ub_bv_synced"; /* 이 기기가 최초 합집합 동기화를 마쳤는지 */
let _syncTimer=null;
function setSyncStatus(txt,color){const el=document.getElementById("syncstatus");if(el){el.textContent=txt;el.style.color=color||"#999";}}
const bvFromCloud=a=>{const L=LOOKUP[a];return L?{a:a,ko:L.ko,s:L.f.sense,d:L.f.day}:null;}; /* 데이터 개편으로 사라진 문장은 버림 */
async function cloudPull(){
  setSyncStatus("☁ 동기화 확인 중…","#999");
  try{
    const r=await fetch(SYNC_URL,{cache:"no-store"});
    if(!r.ok)throw 0;
    const j=await r.json();
    const cBv=(j&&Array.isArray(j.bv))?j.bv:[];
    /* 블롭에 다른 학습 데이터가 살아 있으면 빈 bv는 다른 기기의 '비우기'로 신뢰,
       전부 비어 있으면 저장소 유실로 보고 로컬을 지우는 대신 올린다 */
    const blobAlive=!!(j&&((Array.isArray(j.ids)&&j.ids.length)||(Array.isArray(j.wrongs)&&j.wrongs.length)||(j.srs&&typeof j.srs==="object"&&Object.keys(j.srs).length)));
    if(!localStorage.getItem(SYNCED_KEY)){
      /* 최초 연결: 기존 로컬 오답을 잃지 않게 클라우드와 합침 */
      const had=missed.length;
      for(const a of cBv){if(!missed.some(x=>x.a===a)){const it=bvFromCloud(a);if(it)missed.push(it);}}
      saveMissedLocal();
      try{localStorage.setItem(SYNCED_KEY,"1")}catch(e){}
      if(had>0)cloudPush();
    }else if(!cBv.length&&missed.length&&!blobAlive){
      cloudPush();
    }else{
      /* 이후엔 클라우드 기준 — 다른 기기의 채점·비우기도 반영 */
      missed=cBv.map(bvFromCloud).filter(Boolean);
      saveMissedLocal();
    }
    if(mode==="miss")render();
    setSyncStatus("☁ 동기화됨 · ✗"+missed.length,"#2a8a5a");
  }catch(e){
    setSyncStatus("⚠ 오프라인 — 이 기기에만 저장됨","#b8702a");
  }
}
function cloudPush(){
  if(_syncTimer)clearTimeout(_syncTimer);
  setSyncStatus("☁ 동기화 중…","#999");
  _syncTimer=setTimeout(async()=>{
    try{
      const r=await fetch(SYNC_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({bv:missed.slice(0,100).map(x=>x.a)})});
      if(!r.ok)throw 0;
      setSyncStatus("☁ 동기화됨 · ✗"+missed.length,"#2a8a5a");
    }catch(e){
      setSyncStatus("⚠ 저장 대기 — 오프라인","#b8702a");
    }
  },600);
}

/* 동사 필터 — 복수 선택(토글 칩). 빈 Set = 전체 */
const selVerbs=new Set();
const framesFor=()=>F.filter(f=>!selVerbs.size||selVerbs.has(f.verb));

function buildDeck(){
  let fs;
  if((mode==="drill"||mode==="cloze")&&drillId!=="all")fs=[F.find(f=>f.id===drillId)];
  else fs=framesFor();
  deck=[];
  for(const f of fs){
    let k=0;
    for(const seg of (SECS[f.id]||[["",f.pool.length]])){
      for(let i=0;i<seg[1];i++){const it=f.pool[k++];deck.push({f,a:it[0],ko:it[1],sec:seg[0],rev:false});}
    }
  }
  if(mode==="mix"||mode==="cloze"){
    for(let i=deck.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));const t=deck[i];deck[i]=deck[j];deck[j]=t;}
  }
  idx=0;render();
}
function prevCard(){
  if(mode==="replay"){if(deck.length>1){idx=(idx-1+deck.length)%deck.length;render();}return;}
  if(idx>0){idx--;render();}
}
function nextCard(){
  if(mode==="replay"){if(deck.length>1){idx=(idx+1)%deck.length;render();}else render();return;}
  if(idx<deck.length-1){idx++;render();}else buildDeck();
}
function toggleReveal(){deck[idx].rev=!deck[idx].rev;render();}
function grade(ok){
  const c=deck[idx];
  if(mode==="replay"){
    if(ok){
      sOK++;missed=missed.filter(x=>x.a!==c.a);saveMissed();
      deck.splice(idx,1);
      if(!deck.length){setMode("miss");return;}
      if(idx>=deck.length)idx=0;
      render();
    }else{sNG++;nextCard();}
    return;
  }
  if(ok)sOK++;
  else{sNG++;if(!missed.some(x=>x.a===c.a))missed.unshift({a:c.a,ko:c.ko,s:c.f.sense,d:c.f.day});saveMissed();}
  nextCard();
}
function startReplay(){
  if(!missed.length)return;
  deck=missed.map(x=>{
    const L=LOOKUP[x.a];
    return L?{f:L.f,a:x.a,ko:L.ko,sec:L.sec,rev:false}
            :{f:{day:x.d,verb:"",sense:x.s,pattern:"",hint:x.s,banned:[],pool:[]},a:x.a,ko:x.ko||"",sec:"",rev:false};
  });
  mode="replay";
  for(const t of["mix","drill","cloze","miss"])document.getElementById("tab"+t).classList.toggle("on",t==="miss");
  document.getElementById("selframe").style.display="none";
  idx=0;render();
}

function render(){
  const m=document.getElementById("main");
  if(mode==="miss"){renderMiss(m);renderFoot();return;}
  const c=deck[idx],f=c.f,revealed=c.rev;
  const ban=f.banned.map(b=>"<span>"+esc(b)+"</span>").join("");
  let top=(mode==="replay"?'<span class="pill" style="background:var(--badbg);color:var(--bad)">오답 재학습</span>':"")+
  '<span class="pill">'+esc(f.hint)+"</span>"+(c.sec?'<span class="fmeta">'+esc(c.sec)+"</span>":"");
  if(mode==="drill")top+='<span class="fmeta">D'+f.day+" · "+esc(f.sense)+" ("+f.pool.length+"장)</span>";
  let body;
  if(!revealed){
    const cz=mode==="cloze"?cloze(c.a,f.verb):null;
    body='<div class="meta">'+top+'</div><div class="ko">'+esc(c.ko)+'</div>'+
    (cz?'<div class="cloze">'+esc(cz)+"</div>":"")+
    '<div class="banned">'+ban+'</div>'+
    '<div class="tap">소리 내서 말한 뒤 — 카드를 탭하면 정답, 다시 탭하면 문제</div>';
  }else{
    body='<div class="meta">'+top+'</div><div class="ans">'+esc(c.a)+'</div><div class="kosub">'+esc(c.ko)+'</div>'+
    '<div class="amt"><b>D'+f.day+" · "+esc(f.verb)+"</b> · "+esc(f.sense)+" · "+esc(f.pattern)+"</div>"+
    (NOTES[c.a]?'<div class="note">'+esc(NOTES[c.a])+"</div>":"")+
    '<div class="banned">'+ban+'</div>'+
    '<div class="grade"><button class="gok" id="bok">나왔다 <span class="kbd">1</span></button><button class="gng" id="bng">막혔다 <span class="kbd">2</span></button></div>';
  }
  m.innerHTML='<div class="navrow"><button class="navbtn" id="bprev"'+(idx===0&&mode!=="replay"?" disabled":"")+'>← 이전</button>'+
  '<span class="navpos">'+(idx+1)+" / "+deck.length+'</span>'+
  '<button class="navbtn" id="bnext">'+(idx===deck.length-1?(mode==="mix"||mode==="cloze"?"새로 섞기 ↻":mode==="replay"?"다음 →":"처음부터 ↺"):"다음 →")+'</button></div>'+
  '<div class="card"><div class="cbody" id="cb">'+body+'</div></div>';
  document.getElementById("cb").onclick=()=>toggleReveal();
  if(revealed){
    document.getElementById("bok").onclick=e=>{e.stopPropagation();grade(true)};
    document.getElementById("bng").onclick=e=>{e.stopPropagation();grade(false)};
  }
  document.getElementById("bprev").onclick=()=>prevCard();
  document.getElementById("bnext").onclick=()=>nextCard();
  renderFoot();
}
function renderMiss(m){
  if(!missed.length){m.innerHTML='<div class="empty">막힌 카드가 없습니다.</div>';return;}
  const items=missed.map(x=>'<div class="mitem"><div class="ans">'+esc(x.a)+'</div><div class="kosub">'+esc(x.ko||"")+'</div><div class="amt">D'+x.d+" · "+esc(x.s)+"</div></div>").join("");
  m.innerHTML='<div class="mtop"><span class="fmeta">막힌 카드 '+missed.length+'개 (최근순)</span><span><button id="mreplay">다시 풀기</button> <button id="mclear">비우기</button></span></div><div class="mlist">'+items+"</div>";
  document.getElementById("mreplay").onclick=()=>startReplay();
  document.getElementById("mclear").onclick=()=>{missed=[];saveMissed();renderMiss(document.getElementById("main"))};
}
function renderFoot(){
  const lead=mode==="replay"?"오답 재학습 — 남은 "+deck.length+"장":"카드 "+TOTAL+"장";
  document.getElementById("foot").innerHTML=lead+" · 이번 세션 <b>"+sOK+"</b> 나옴 · <b>"+sNG+"</b> 막힘"+
  '<span class="kbd">space 정답/다음 · ←→ 이동 · 1/2 채점</span>';
}

function setMode(m2){
  mode=m2;
  for(const t of["mix","drill","cloze","miss"])document.getElementById("tab"+t).classList.toggle("on",t===m2);
  document.getElementById("selframe").style.display=(m2==="drill"||m2==="cloze")?"":"none";
  if(m2==="miss")render();else buildDeck();
}
document.getElementById("tabmix").onclick=()=>setMode("mix");
document.getElementById("tabdrill").onclick=()=>setMode("drill");
document.getElementById("tabcloze").onclick=()=>setMode("cloze");
document.getElementById("tabmiss").onclick=()=>setMode("miss");

const sf=document.getElementById("selframe");
sf.innerHTML='<option value="all">전체 프레임 ('+TOTAL+'장)</option>'+F.map(f=>'<option value="'+f.id+'">D'+f.day+" — "+esc(f.sense)+" ("+f.pool.length+"장)</option>").join("");
sf.onchange=()=>{drillId=sf.value;buildDeck();};
const VERBS=["have","get","make","take","do"];
function renderVerbChips(){
  const el=document.getElementById("selverb");
  const selN=framesFor().reduce((s,f)=>s+f.pool.length,0);
  el.innerHTML='<button class="'+(selVerbs.size?'':'on')+'" data-v="all">전체'+(selVerbs.size?'':' ('+TOTAL+'장)')+'</button>'+
    VERBS.map(v=>'<button class="'+(selVerbs.has(v)?'on':'')+'" data-v="'+v+'">'+v+" ("+CNT(v)+"장)</button>").join("")+
    (selVerbs.size?'<span class="fmeta">'+selN+'장</span>':"");
  for(const b of el.querySelectorAll("button"))b.onclick=()=>{
    const v=b.dataset.v;
    if(v==="all")selVerbs.clear();
    else{
      if(selVerbs.has(v))selVerbs.delete(v);else selVerbs.add(v);
      if(selVerbs.size===VERBS.length)selVerbs.clear(); /* 전부 고르면 = 전체 */
    }
    renderVerbChips();
    if(mode!=="miss")buildDeck();
  };
}
renderVerbChips();

document.addEventListener("keydown",e=>{
  if(mode==="miss")return;
  if(e.key===" "||e.key==="Enter"){e.preventDefault();deck[idx].rev?nextCard():toggleReveal();}
  else if(e.key==="ArrowLeft")prevCard();
  else if(e.key==="ArrowRight")nextCard();
  else if(e.key==="1"&&deck[idx].rev)grade(true);
  else if(e.key==="2"&&deck[idx].rev)grade(false);
});
buildDeck();
cloudPull();
</script>

</body>
</html>
